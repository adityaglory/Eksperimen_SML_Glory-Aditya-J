name: CI Workflow MLOps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    env:
      MLFLOW_ALLOW_FILE_STORE: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas

      - name: Train Model
        run: |
          export MLFLOW_TRACKING_URI="file://${GITHUB_WORKSPACE}/mlruns"
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get Run ID
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          export MLFLOW_TRACKING_URI="file://${GITHUB_WORKSPACE}/mlruns"
          mlflow models build-docker -m "runs:/${RUN_ID}/model" -n "bank-churn-model:latest"
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
          docker tag bank-churn-model:latest ${{ secrets.DOCKER_USERNAME }}/bank-churn-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/bank-churn-model:latest